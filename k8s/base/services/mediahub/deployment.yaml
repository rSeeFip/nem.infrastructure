apiVersion: apps/v1
kind: Deployment
metadata:
  name: nem-mediahub
  namespace: nem
  labels:
    app: nem-mediahub
    app.kubernetes.io/part-of: nem-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nem-mediahub
  template:
    metadata:
      labels:
        app: nem-mediahub
        app.kubernetes.io/part-of: nem-platform
    spec:
      containers:
        - name: nem-mediahub
          image: localhost:5000/nem-mediahub:dev
          ports:
            - containerPort: 5700
          envFrom:
            - configMapRef:
                name: nem-mediahub-config
          readinessProbe:
            httpGet:
              path: /health
              port: 5700
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
