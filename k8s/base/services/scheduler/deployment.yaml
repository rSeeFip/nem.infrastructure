apiVersion: apps/v1
kind: Deployment
metadata:
  name: nem-scheduler
  namespace: nem
  labels:
    app: nem-scheduler
    app.kubernetes.io/part-of: nem-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nem-scheduler
  template:
    metadata:
      labels:
        app: nem-scheduler
        app.kubernetes.io/part-of: nem-platform
    spec:
      containers:
        - name: nem-scheduler
          image: localhost:5000/nem-scheduler:dev
          ports:
            - containerPort: 5600
          envFrom:
            - configMapRef:
                name: nem-scheduler-config
          readinessProbe:
            httpGet:
              path: /health
              port: 5600
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
