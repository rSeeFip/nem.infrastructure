apiVersion: v1
kind: ConfigMap
metadata:
  name: nem-classification-config
  namespace: nem
  labels:
    app: nem-classification
    app.kubernetes.io/part-of: nem-platform
data:
  ASPNETCORE_ENVIRONMENT: Development
  ASPNETCORE_URLS: "http://+:5270"
  ConnectionStrings__PostgreSql: "Host=postgres;Port=5432;Database=classification;Username=classification;Password=classification_dev"
  ConnectionStrings__RabbitMQ: "amqp://guest:guest@rabbitmq:5672"
  Presidio__BaseUrl: "http://localhost:5001"
  Mcp__Enabled: "true"
  Mcp__McpApiBaseUrl: "http://nem-mcp:8080"
  Mcp__ServiceId: "classification-service"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  NEM_CONFIGURATION_URL: "http://nem-configuration:8080"
