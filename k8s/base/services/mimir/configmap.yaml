apiVersion: v1
kind: ConfigMap
metadata:
  name: nem-mimir-config
  namespace: nem
data:
  ASPNETCORE_ENVIRONMENT: Development
  ASPNETCORE_HTTP_PORTS: "5000"
  ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=mimir;Username=mimir;Password=mimir_dev_password"
  Database__ConnectionString: "Host=postgres;Port=5432;Database=mimir;Username=mimir;Password=mimir_dev_password"
  RabbitMQ__ConnectionString: "amqp://guest:guest@rabbitmq:5672"
  Jwt__Authority: "http://keycloak:8080/realms/nem"
  Jwt__Audience: "nem-mimir"
  Jwt__RequireHttpsMetadata: "false"
  LiteLlm__BaseUrl: "http://litellm:4000"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  NEM_CONFIGURATION_URL: "http://nem-configuration:8080"
