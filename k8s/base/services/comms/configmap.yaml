apiVersion: v1
kind: ConfigMap
metadata:
  name: nem-comms-config
  namespace: nem
data:
  ASPNETCORE_ENVIRONMENT: Development
  ASPNETCORE_URLS: "http://+:5280"
  ConnectionStrings__PostgreSql: "Host=postgres;Port=5432;Database=comms;Username=comms;Password=comms_dev"
  ConnectionStrings__RabbitMQ: "amqp://guest:guest@rabbitmq:5672"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  Testing__SkipExternalDependencies: "false"
  Mcp__Enabled: "true"
  Mcp__McpApiBaseUrl: "http://nem-mcp:8080"
  Mcp__ServiceId: "comms-service"
  NEM_CONFIGURATION_URL: "http://nem-configuration:8080"
