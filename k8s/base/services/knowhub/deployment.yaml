apiVersion: apps/v1
kind: Deployment
metadata:
  name: nem-knowhub
  namespace: nem
  labels:
    app: nem-knowhub
    app.kubernetes.io/part-of: nem-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nem-knowhub
  template:
    metadata:
      labels:
        app: nem-knowhub
        app.kubernetes.io/part-of: nem-platform
    spec:
      containers:
        - name: nem-knowhub
          image: localhost:5000/nem-knowhub:dev
          ports:
            - containerPort: 5001
          envFrom:
            - configMapRef:
                name: nem-knowhub-config
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
