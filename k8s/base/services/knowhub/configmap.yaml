apiVersion: v1
kind: ConfigMap
metadata:
  name: nem-knowhub-config
  namespace: nem
  labels:
    app: nem-knowhub
    app.kubernetes.io/part-of: nem-platform
data:
  ASPNETCORE_ENVIRONMENT: Development
  ASPNETCORE_URLS: "http://+:5001"
  ConnectionStrings__KnowHub: "Host=postgres;Port=5432;Database=knowhub;Username=knowhub;Password=knowhub_dev"
  ConnectionStrings__Marten: "Host=postgres;Port=5432;Database=knowhub;Username=knowhub;Password=knowhub_dev"
  RabbitMq__ConnectionString: "amqp://guest:guest@rabbitmq:5672"
  KnowHubOptions__StandaloneMode: "true"
  ServiceAuth__Issuer: "nem-services"
  ServiceAuth__Audience: "nem-services"
  ServiceAuth__PublicKeyPem: ""
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  NEM_CONFIGURATION_URL: "http://nem-configuration:8080"
