apiVersion: v1
kind: ConfigMap
metadata:
  name: nem-backup-config
  namespace: nem
  labels:
    app: nem-backup
    app.kubernetes.io/part-of: nem-platform
data:
  ASPNETCORE_ENVIRONMENT: Development
  ASPNETCORE_URLS: "http://+:5500"
  BACKUP_DB_CONNECTION: "Host=postgres;Port=5432;Database=nembackup;Username=nembackup;Password=nembackup_dev"
  BACKUP_RABBITMQ_HOST: "rabbitmq"
  BACKUP_RABBITMQ_PORT: "5672"
  BACKUP_RABBITMQ_USER: "guest"
  BACKUP_RABBITMQ_PASSWORD: "guest"
  OPENBAO_TOKEN: "dev-root-token"
  OpenBao__Address: "http://openbao:8200"
  OpenBao__Enabled: "true"
  OpenBao__MountPoint: "secret"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  NEM_CONFIGURATION_URL: "http://nem-configuration:8080"
