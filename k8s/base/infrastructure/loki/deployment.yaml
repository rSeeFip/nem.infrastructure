apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: nem
  labels:
    app: loki
    app.kubernetes.io/part-of: nem-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
        app.kubernetes.io/part-of: nem-platform
    spec:
      containers:
      - name: loki
        image: grafana/loki:3.3.2
        args:
          - -config.file=/etc/loki/config.yaml
        ports:
        - name: http
          containerPort: 3100
        readinessProbe:
          httpGet:
            path: /ready
            port: 3100
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: config
          mountPath: /etc/loki
          readOnly: true
        - name: storage
          mountPath: /loki
      volumes:
      - name: config
        configMap:
          name: loki-config
      - name: storage
        persistentVolumeClaim:
          claimName: loki-data
