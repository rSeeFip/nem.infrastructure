apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: nem
  labels:
    app: prometheus
    app.kubernetes.io/part-of: nem-platform
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      scrape_timeout: 10s

    scrape_configs:
      - job_name: 'otel-collector'
        static_configs:
          - targets: ['otel-collector:8889']
        metrics_path: /metrics
        scheme: http

      - job_name: 'nem-services'
        static_configs:
          - targets: ['nem-mcp:8080']
            labels:
              service: nem-mcp
          - targets: ['nem-knowhub:5001']
            labels:
              service: nem-knowhub
          - targets: ['nem-mediahub:5700']
            labels:
              service: nem-mediahub
          - targets: ['nem-comms:5400']
            labels:
              service: nem-comms
        metrics_path: /metrics
        scheme: http

      - job_name: 'infrastructure'
        static_configs:
          - targets: ['rabbitmq:15692']
            labels:
              service: rabbitmq
        metrics_path: /metrics
        scheme: http
