apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: nem
  labels:
    app: prometheus
    app.kubernetes.io/part-of: nem-platform
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      scrape_timeout: 10s

    scrape_configs:
      - job_name: 'otel-collector'
        static_configs:
          - targets: ['otel-collector:8889']
        metrics_path: /metrics
        scheme: http

      - job_name: 'nem-services'
        static_configs:
          - targets: ['mcp:5000']
            labels:
              service: nem-mcp
          - targets: ['knowhub:5100']
            labels:
              service: nem-knowhub
          - targets: ['mediahub:5700']
            labels:
              service: nem-mediahub
          - targets: ['assetcore:8080']
            labels:
              service: nem-assetcore
          - targets: ['holisticworld:8080']
            labels:
              service: nem-holisticworld
          - targets: ['comms:5400']
            labels:
              service: nem-comms
        metrics_path: /metrics
        scheme: http

      - job_name: 'infrastructure'
        static_configs:
          - targets: ['rabbitmq:15692']
            labels:
              service: rabbitmq
          - targets: ['postgres-exporter:9187']
            labels:
              service: postgresql
        metrics_path: /metrics
        scheme: http
