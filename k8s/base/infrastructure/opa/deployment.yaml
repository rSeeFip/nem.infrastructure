apiVersion: apps/v1
kind: Deployment
metadata:
  name: opa
  namespace: nem
  labels:
    app: opa
    app.kubernetes.io/part-of: nem-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opa
  template:
    metadata:
      labels:
        app: opa
        app.kubernetes.io/part-of: nem-platform
    spec:
      containers:
        - name: opa
          image: openpolicyagent/opa:0.68.0
          args:
            - run
            - --server
            - --addr=0.0.0.0:8181
          ports:
            - containerPort: 8181
          readinessProbe:
            httpGet:
              path: /health
              port: 8181
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
