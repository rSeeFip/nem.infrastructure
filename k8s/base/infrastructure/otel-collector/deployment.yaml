apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: nem
  labels:
    app: otel-collector
    app.kubernetes.io/part-of: nem-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
        app.kubernetes.io/part-of: nem-platform
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.115.0
          args:
            - --config=/etc/otelcol/config.yaml
          ports:
            - name: grpc-otlp
              containerPort: 4317
            - name: http-otlp
              containerPort: 4318
            - name: health
              containerPort: 13133
            - name: prometheus
              containerPort: 8889
          readinessProbe:
            httpGet:
              path: /
              port: 13133
          resources:
            limits:
              memory: 512Mi
              cpu: 500m
          volumeMounts:
            - name: otel-collector-config
              mountPath: /etc/otelcol/config.yaml
              subPath: config.yaml
              readOnly: true
      volumes:
        - name: otel-collector-config
          configMap:
            name: otel-collector-config
            items:
              - key: config.yaml
                path: config.yaml
