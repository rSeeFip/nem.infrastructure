apiVersion: batch/v1
kind: Job
metadata:
  name: openbao-seed-secrets
  labels:
    app: openbao-seed
    app.kubernetes.io/part-of: nem-platform
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: openbao-seed
        app.kubernetes.io/part-of: nem-platform
    spec:
      restartPolicy: OnFailure
      initContainers:
        - image: openbao/openbao:2.1.0
          name: wait-for-openbao
          command:
            - sh
            - -c
            - until bao status -address=http://openbao:8200 2>&1 | grep -q "Sealed.*false"; do echo "Waiting for OpenBao..."; sleep 5; done
          env:
            - name: BAO_ADDR
              value: "http://openbao:8200"
            - name: BAO_TOKEN
              value: "dev-root-token"
      containers:
        - name: seed-secrets
          image: openbao/openbao:2.1.0
          command:
            - sh
            - /scripts/seed-secrets.sh
          env:
            - name: BAO_ADDR
              value: "http://openbao:8200"
            - name: BAO_TOKEN
              value: "dev-root-token"
          volumeMounts:
            - name: seed-script
              mountPath: /scripts/seed-secrets.sh
              subPath: seed-secrets.sh
              readOnly: true
      volumes:
        - name: seed-script
          configMap:
            name: openbao-seed-script
            defaultMode: 0555
