apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-path
  labels:
    app.kubernetes.io/part-of: nem-platform
provisioner: rancher.io/local-path
allowVolumeExpansion: true
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
parameters:
  # K3s local-path provisioner stores at /var/lib/rancher/k3s/storage/
  # Dev persistence — retain volumes for debugging
