version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: nem-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - nem-pgdata:/var/lib/postgresql/data
      - ./postgres-initdb.d/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nem-network

  rabbitmq:
    image: rabbitmq:3.13.7-management
    container_name: nem-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nem-network

  opencost-mock:
    image: python:3.12-alpine
    container_name: nem-opencost-mock
    command:
      - sh
      - -c
      - |
        python - <<'PY'
        from http.server import BaseHTTPRequestHandler, HTTPServer
        import json

        class Handler(BaseHTTPRequestHandler):
          def _reply(self):
            body = json.dumps({"status": "ok", "path": self.path}).encode()
            self.send_response(200)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

          def do_GET(self):
            self._reply()

          def do_POST(self):
            self._reply()

          def log_message(self, format, *args):
            return

        HTTPServer(("0.0.0.0", 9003), Handler).serve_forever()
        PY
    ports:
      - "9003:9003"
    networks:
      - nem-network

  keycloak:
    build:
      context: .
      dockerfile: keycloak/Dockerfile
    container_name: nem-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://nem-postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-lc", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - nem-network

  opa:
    image: openpolicyagent/opa:0.68.0
    container_name: nem-opa
    command: run --server --addr 0.0.0.0:8181
    ports:
      - "8181:8181"
    networks:
      - nem-network

  vault:
    image: openbao/openbao:2.1.0
    container_name: nem-vault
    cap_add:
      - IPC_LOCK
    environment:
      BAO_DEV_ROOT_TOKEN_ID: ${BAO_DEV_ROOT_TOKEN_ID}
      BAO_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    networks:
      nem-network:
        aliases:
          - openbao

  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: nem-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nem.local.dev
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - nem-network

  profitcenter:
    image: ghcr.io/nem/nem-profitcenter:latest
    container_name: nem-profitcenter
    ports:
      - "5080:5080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=profitcenter;Username=postgres;Password=${POSTGRES_PASSWORD}
      ConnectionStrings__TimescaleDb: Host=postgres;Port=5432;Database=profitcenter;Username=postgres;Password=${POSTGRES_PASSWORD}
      RabbitMq__ConnectionString: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      OpenCost__Endpoint: ${OPENCOST_ENDPOINT:-http://opencost-mock:9003}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - nem-network

  gateway:
    build:
      context: ..
      dockerfile: nem.infrastructure/nem.Gateway/Dockerfile
    container_name: nem-gateway
    ports:
      - "${GATEWAY_PORT:-8090}:${GATEWAY_PORT:-8090}"
    environment:
      GATEWAY_PORT: ${GATEWAY_PORT:-8090}
      MCP_CLUSTER_ADDRESS: http://nem-mcp:8080
      KNOWHUB_CLUSTER_ADDRESS: http://host.docker.internal:5001
      HOLISTICWORLD_CLUSTER_ADDRESS: http://host.docker.internal:5002
      ASSETCORE_CLUSTER_ADDRESS: http://host.docker.internal:5003
      MEDIAHUB_CLUSTER_ADDRESS: http://host.docker.internal:5004
      SHELL_CLUSTER_ADDRESS: http://host.docker.internal:3000
      COGNITIVE_CLUSTER_ADDRESS: http://host.docker.internal:3001
      KNOWHUB_FRONTEND_CLUSTER_ADDRESS: http://host.docker.internal:3002
      MCP_FRONTEND_CLUSTER_ADDRESS: http://host.docker.internal:3003
      ASSETCORE_FRONTEND_CLUSTER_ADDRESS: http://host.docker.internal:3004
      MIMIR_CLUSTER_ADDRESS: http://host.docker.internal:3005
      WORLD_CLUSTER_ADDRESS: http://host.docker.internal:3006
      MEDIAHUB_FRONTEND_CLUSTER_ADDRESS: http://host.docker.internal:3007
      HOME_CLUSTER_ADDRESS: http://host.docker.internal:3008
      SCHEDULER_CLUSTER_ADDRESS: http://host.docker.internal:3009
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - nem-network

  otel-collector:
    build:
      context: ./otel-collector
      dockerfile: Dockerfile
    container_name: nem-otel-collector
    command: ["--config=/etc/otelcol/otel-collector-config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
      - "8889:8889"
      - "55679:55679"
    depends_on:
      tempo:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - nem-network

  prometheus:
    build:
      context: ./prometheus
      dockerfile: Dockerfile
    container_name: nem-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-remote-write-receiver'
      - '--enable-feature=exemplar-storage'
    volumes:
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - nem-network

  loki:
    build:
      context: ./loki
      dockerfile: Dockerfile
    container_name: nem-loki
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - loki-data:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - nem-network

  tempo:
    build:
      context: ./tempo
      dockerfile: Dockerfile
    container_name: nem-tempo
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - nem-network

  grafana:
    build:
      context: ./grafana
      dockerfile: Dockerfile
    container_name: nem-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3010:3000"
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - nem-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: nem-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9187/metrics"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nem-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: nem-cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8085:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - nem-network

volumes:
  nem-pgdata:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:

networks:
  nem-network:
    external: true
    name: nem-network
