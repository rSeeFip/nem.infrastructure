# ─────────────────────────────────────────────────────────────────────────────
# nem Cognitive Platform — Jaeger Distributed Tracing
# ─────────────────────────────────────────────────────────────────────────────
# Jaeger all-in-one for local development distributed tracing.
# Receives traces from all nem.* services via OTLP (gRPC/HTTP).
# Usage:  docker compose -f docker-compose.jaeger.yml up -d
# UI:     http://localhost:16686
# OTLP:   gRPC  localhost:4317
#         HTTP  localhost:4318
# ─────────────────────────────────────────────────────────────────────────────

services:
  nem-jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: nem-jaeger
    hostname: nem-jaeger
    ports:
      - "16686:16686"    # Jaeger UI
      - "4317:4317"      # OTLP gRPC receiver
      - "4318:4318"      # OTLP HTTP receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:16686/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
