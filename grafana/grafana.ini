[server]
root_url = http://localhost:3010
serve_from_sub_path = false

[auth.anonymous]
enabled = true
org_role = Viewer

[security]
admin_user = admin
admin_password = ${GF_SECURITY_ADMIN_PASSWORD}

[dashboards]
default_home_dashboard_path = /var/lib/grafana/dashboards/infrastructure-overview.json

[analytics]
reporting_enabled = false
check_for_updates = false

[log]
mode = console
level = info

[unified_alerting]
enabled = true
