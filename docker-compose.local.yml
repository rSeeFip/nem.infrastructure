# =============================================================================
# Docker Compose Local Overlay — Full Local Stack
# =============================================================================
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#
# This overlay adds all services needed for a fully local deployment:
#   - Ollama (local LLM inference)
#   - LiteLLM proxy (unified LLM routing)
#   - Qdrant (vector database)
#   - Redis (caching)
#   - All nem.* services built from local source
#
# The base docker-compose.yml already provides:
#   - PostgreSQL, RabbitMQ, Keycloak, OPA, OpenBao, Gateway
#   - Full observability stack (OTEL, Prometheus, Loki, Tempo, Grafana)
#
# Prerequisites:
#   1. Ollama installed on host: curl -fsSL https://ollama.com/install.sh | sh
#   2. At least one model pulled: ollama pull llama3.1
#   3. nem-network exists: docker network create nem-network
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Ollama — Local LLM inference
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: nem-ollama
    ports:
      - "11434:11434"
    volumes:
      - nem-ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - nem-network

  # ---------------------------------------------------------------------------
  # LiteLLM Proxy — Unified LLM routing (local-only mode)
  # ---------------------------------------------------------------------------
  litellm-proxy:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: nem-litellm-proxy
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      OLLAMA_API_BASE: "http://ollama:11434"
    ports:
      - "4000:4000"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.settimeout(3); s.connect(('127.0.0.1', 4000)); s.close()"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - nem-network

  # ---------------------------------------------------------------------------
  # Qdrant — Vector database for RAG / embeddings
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: nem-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - nem-qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-lc", "exec 3<>/dev/tcp/127.0.0.1/6333; printf 'GET /readyz HTTP/1.1\r\nHost: localhost\r\n\r\n' >&3; grep -q '200 OK' <&3"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nem-network

  # ---------------------------------------------------------------------------
  # Redis — Caching layer
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: nem-redis
    ports:
      - "6379:6379"
    volumes:
      - nem-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nem-network

  # ---------------------------------------------------------------------------
  # nem.* Services — Built from local source
  # ---------------------------------------------------------------------------
  nem-mcp:
    build:
      context: ..
      dockerfile: nem.MCP/Dockerfile
      target: api
    container_name: nem-mcp-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=nemmcp;Username=postgres;Password=${POSTGRES_PASSWORD}
      RabbitMq__ConnectionString: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      OrganismCache__ConnectionString: redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      Keycloak__Authority: http://keycloak:8080/realms/nem
      Keycloak__Audience: mcp-api
      Keycloak__RequireHttpsMetadata: "false"
      OpenBao__Address: http://vault:8200
      OpenBao__Token: ${BAO_DEV_ROOT_TOKEN_ID}
      OpenBao__Enabled: "true"
      Opa__BaseUrl: http://opa:8181
      Lifecycle__Reconciliation__ScheduleOnStartup: "false"
      Cors__AllowedOrigins__0: http://localhost:4200
      Cors__AllowedOrigins__1: http://localhost:4300
      Cors__AllowedOrigins__2: http://localhost:3000
      Cors__AllowedMethods__0: GET
      Cors__AllowedMethods__1: POST
      Cors__AllowedMethods__2: PUT
      Cors__AllowedMethods__3: PATCH
      Cors__AllowedMethods__4: DELETE
      Cors__AllowedMethods__5: OPTIONS
      Cors__AllowedHeaders__0: Authorization
      Cors__AllowedHeaders__1: Content-Type
      Cors__AllowedHeaders__2: X-Requested-With
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-lc", "wget -qO- http://127.0.0.1:8080/health >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 40s
    networks:
      - nem-network

  nem-knowhub:
    build:
      context: ..
      dockerfile: nem.KnowHub/Dockerfile
      target: api
    container_name: nem-knowhub-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5001
      ConnectionStrings__KnowHub: Host=postgres;Port=5432;Database=knowhub;Username=postgres;Password=${POSTGRES_PASSWORD}
      ConnectionStrings__Marten: Host=postgres;Port=5432;Database=knowhub;Username=postgres;Password=${POSTGRES_PASSWORD}
      RabbitMq__ConnectionString: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      Embedding__Provider: Ollama
      Embedding__Ollama__BaseUrl: http://ollama:11434
      Embedding__Ollama__ModelName: nomic-embed-text
      Embedding__Ollama__Dimensions: 768
    ports:
      - "5100:5001"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-lc", "curl -fsS http://127.0.0.1:5001/api/v1/health >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 45s
    networks:
      - nem-network

  nem-mimir:
    build:
      context: ..
      dockerfile: nem.Mimir-typed-ids/docker/api/Dockerfile
    container_name: nem-mimir-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 5000
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=mimir;Username=postgres;Password=${POSTGRES_PASSWORD}
      Database__ConnectionString: Host=postgres;Port=5432;Database=mimir;Username=postgres;Password=${POSTGRES_PASSWORD}
      RabbitMQ__ConnectionString: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      Jwt__Authority: http://keycloak:8080/realms/nem
      LiteLlm__BaseUrl: http://litellm-proxy:4000
      LiteLlm__ApiKey: ${LITELLM_MASTER_KEY}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "5223:5000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      litellm-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-lc", "wget -qO- http://127.0.0.1:5000/health >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 45s
    networks:
      - nem-network

  nem-inferencegateway:
    build:
      context: ..
      dockerfile: nem.InferenceGateway/Dockerfile
    container_name: nem-inferencegateway-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=inferencegateway;Username=postgres;Password=${POSTGRES_PASSWORD}
      RabbitMq__ConnectionString: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      LiteLlm__BaseUrl: http://litellm-proxy:4000
      LiteLlm__ApiKey: ${LITELLM_MASTER_KEY}
      Keycloak__Authority: http://keycloak:8080/realms/nem
      Keycloak__Audience: nem-mcp
      Keycloak__RequireHttpsMetadata: "false"
      Ollama__Endpoint: http://ollama:11434
      Inference__DeploymentMode: local
      Inference__SensitiveRoutingPolicy: local-only
    ports:
      - "5007:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ollama:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-lc", "wget -qO- http://127.0.0.1:8080/health >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - nem-network

  nem-scheduler:
    build:
      context: ..
      dockerfile: nem.Scheduler/Dockerfile
    container_name: nem-scheduler-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__SchedulerDb: Host=postgres;Port=5432;Database=scheduler;Username=postgres;Password=${POSTGRES_PASSWORD}
      RabbitMq__ConnectionString: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      Keycloak__Authority: http://keycloak:8080/realms/nem
      Keycloak__Audience: nem-scheduler
      Keycloak__RequireHttpsMetadata: "false"
    ports:
      - "5020:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-lc", "exec 3<>/dev/tcp/127.0.0.1/8080; printf 'GET /health HTTP/1.1\r\nHost: localhost\r\n\r\n' >&3; grep -q '200 OK' <&3"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - nem-network

  nem-workflow:
    build:
      context: ..
      dockerfile: nem.Workflow/Dockerfile
    container_name: nem-workflow-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=workflow;Username=postgres;Password=${POSTGRES_PASSWORD}
      RabbitMq__ConnectionString: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      Keycloak__Authority: http://keycloak:8080/realms/nem
      Keycloak__Audience: nem-workflow
      Keycloak__RequireHttpsMetadata: "false"
      Vault__Address: http://vault:8200
      Vault__Token: ${BAO_DEV_ROOT_TOKEN_ID}
      Opa__BaseUrl: http://opa:8181
      Cors__AllowedOrigins__0: http://localhost:4200
      Cors__AllowedOrigins__1: http://localhost:4300
      Cors__AllowedOrigins__2: http://localhost:3000
      Cors__AllowedMethods__0: GET
      Cors__AllowedMethods__1: POST
      Cors__AllowedMethods__2: PUT
      Cors__AllowedMethods__3: PATCH
      Cors__AllowedMethods__4: DELETE
      Cors__AllowedMethods__5: OPTIONS
      Cors__AllowedHeaders__0: Authorization
      Cors__AllowedHeaders__1: Content-Type
      Cors__AllowedHeaders__2: X-Requested-With
    ports:
      - "5006:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-lc", "wget -qO- http://127.0.0.1:8080/health >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - nem-network

volumes:
  nem-ollama-data:
  nem-qdrant-data:
  nem-redis-data:

networks:
  nem-network:
    external: true
    name: nem-network
