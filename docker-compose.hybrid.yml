# =============================================================================
# Docker Compose Hybrid Overlay — Local Inference + Cloud Services
# =============================================================================
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.hybrid.yml up -d
#
# This overlay starts ONLY local inference services for hybrid mode:
#   - Ollama (local LLM for sensitive data)
#   - LiteLLM proxy (routes between local Ollama and cloud providers)
#   - Optionally PostgreSQL (if using local database)
#
# Cloud services (managed externally, NOT started by this overlay):
#   - PostgreSQL (cloud-managed, e.g., AWS RDS)
#   - RabbitMQ (cloud-managed, e.g., CloudAMQP)
#   - Keycloak (cloud-managed OIDC)
#   - Qdrant (cloud-managed vector DB)
#   - Redis (cloud-managed)
#   - OpenBao/Vault (cloud-managed secrets)
#
# Prerequisites:
#   1. Ollama installed on host or GPU-capable Docker
#   2. At least one model pulled: ollama pull llama3.1
#   3. Cloud service endpoints configured via environment variables
#   4. nem-network exists: docker network create nem-network
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Ollama — Local LLM inference for sensitive data
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: nem-ollama
    ports:
      - "11434:11434"
    volumes:
      - nem-ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - nem-network

  # ---------------------------------------------------------------------------
  # LiteLLM Proxy — Routes sensitive data to Ollama, non-sensitive to cloud
  # ---------------------------------------------------------------------------
  litellm-proxy:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: nem-litellm-proxy
    environment:
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY:-sk-hybrid-dev-key}"
      OLLAMA_API_BASE: "http://ollama:11434"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - nem-network

  # ---------------------------------------------------------------------------
  # nem.InferenceGateway — Hybrid routing (local sensitive, cloud non-sensitive)
  # ---------------------------------------------------------------------------
  nem-inferencegateway:
    build:
      context: ..
      dockerfile: nem.InferenceGateway/Dockerfile
    container_name: nem-inferencegateway-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=${POSTGRES_HOST};Port=5432;Database=inferencegateway;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      RabbitMq__ConnectionString: "amqps://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@${RABBITMQ_HOST}:5671/"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      LiteLlm__BaseUrl: http://litellm-proxy:4000
      Ollama__Endpoint: http://ollama:11434
      Inference__DeploymentMode: hybrid
      Inference__SensitiveRoutingPolicy: local-only
    ports:
      - "5007:8080"
    depends_on:
      ollama:
        condition: service_healthy
      litellm-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - nem-network

volumes:
  nem-ollama-data:

networks:
  nem-network:
    external: true
    name: nem-network
