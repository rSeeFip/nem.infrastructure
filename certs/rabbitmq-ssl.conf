# ═══════════════════════════════════════════════════════════════════════════════
# RabbitMQ TLS Configuration — DEV ONLY
# ═══════════════════════════════════════════════════════════════════════════════
# Used by docker-compose.tls.yml overlay to enable TLS on RabbitMQ.
# Certificates are generated by infrastructure/certs/generate-dev-certs.sh
# ═══════════════════════════════════════════════════════════════════════════════

# ─── TLS Listener ─────────────────────────────────────────────────────────────
# Enable AMQPS on port 5671 (standard TLS port)
listeners.ssl.default = 5671

# Keep plain AMQP on 5672 for backward compatibility (non-TLS dev workflows)
listeners.tcp.default = 5672

# ─── Server Certificate ──────────────────────────────────────────────────────
ssl_options.cacertfile = /etc/rabbitmq/certs/ca-chain.crt
ssl_options.certfile   = /etc/rabbitmq/certs/rabbitmq.crt
ssl_options.keyfile    = /etc/rabbitmq/certs/rabbitmq.key

# ─── TLS Protocol Settings ───────────────────────────────────────────────────
ssl_options.versions.1 = tlsv1.3
ssl_options.versions.2 = tlsv1.2

# ─── Client Certificate Verification (mTLS) ──────────────────────────────────
# verify_peer = require client certificates
# fail_if_no_peer_cert = reject connections without client cert
ssl_options.verify               = verify_peer
ssl_options.fail_if_no_peer_cert = true

# ─── Management Plugin TLS ───────────────────────────────────────────────────
# Management UI listens on HTTPS at port 15671
management.ssl.port       = 15671
management.ssl.cacertfile = /etc/rabbitmq/certs/ca-chain.crt
management.ssl.certfile   = /etc/rabbitmq/certs/rabbitmq.crt
management.ssl.keyfile    = /etc/rabbitmq/certs/rabbitmq.key
